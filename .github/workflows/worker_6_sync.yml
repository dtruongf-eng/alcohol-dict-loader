# .github/workflows/worker_6_sync.yml
name: Worker 6 Background Sync (Parallel 6 Keys)

on:
  schedule:
    # ⏱️ Tự động chạy ngầm mỗi 15 phút một lần
    - cron: '*/15 * * * *'
  # 🕹️ Cho phép bấm nút kích hoạt chạy thủ công trên giao diện GitHub Actions bất cứ lúc nào
  workflow_dispatch: 

jobs:
  sync_task:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mã nguồn từ GitHub của bạn
        uses: actions/checkout@v4

      - name: Thiết lập môi trường Node.js thế hệ mới
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cài đặt và cấu hình Wrangler CLI toàn cục
        run: |
          npm install -g wrangler

      - name: Khởi chạy luồng số 6 đặt câu song song 6 Keys
        env:
          # Token đăng nhập tự động của Cloudflare (Lấy từ Secrets)
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Chuỗi 6 Keys phụ của bạn (Lấy từ Secrets)
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY_6 }}
        run: |
          node sync_groq_batch.js --worker=6